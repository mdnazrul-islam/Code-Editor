name: Android CI Build & Asset Generator

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android App & Generate Wrapper Elements
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Auto-Generate Gradle Wrapper Files (.bat, .jar, wrapper config)
      run: |
        echo "=== Installed Gradle version on Runner ==="
        gradle -v
        echo "=== Generating Wrapper Assets ==="
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew
        echo "=== Generation Completed! ==="
        ls -la gradlew gradlew.bat
        ls -la gradle/wrapper/

    - name: Run Code Compilation & Lint Checks
      run: ./gradlew testDebugUnitTest --continue

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Code-Editor-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload Auto-Generated Wrapper Artifacts (.bat and .jar wrapper)
      uses: actions/upload-artifact@v4
      with:
        name: Gradle-Wrapper-Assets
        path: |
          gradlew
          gradlew.bat
          gradle/wrapper/gradle-wrapper.jar
          gradle/wrapper/gradle-wrapper.properties
        if-no-files-found: error
